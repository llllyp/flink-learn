
################################################################################
# Flink 作业日志配置文件
# 功能：仅打印程序输出结果和错误信息，过滤 Flink 运行时 INFO 日志
################################################################################

# ==================== 根日志配置 ====================
# 设置根日志级别为 INFO，控制台输出
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

# ==================== 控制台输出配置 ====================
# 定义控制台追加器
appender.console.name = ConsoleAppender
appender.console.type = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss,SSS} %-5p %-60c %x - %m%n

# ==================== Flink 框架日志配置 ====================
# Flink 核心框架日志 - 只打印警告和错误，过滤任务部署、状态后端等 INFO 日志
logger.flink.name = org.apache.flink
logger.flink.level = WARN

# TaskManager 运行时日志 - 过滤任务切换、加载 JAR 等信息
logger.taskmanager.name = org.apache.flink.runtime.taskmanager
logger.taskmanager.level = WARN

# TaskExecutor 日志 - 过滤 slot 分配、任务接收等信息
logger.taskexecutor.name = org.apache.flink.runtime.taskexecutor
logger.taskexecutor.level = WARN

# Streaming 运行时日志 - 过滤状态后端设置等运行时信息
logger.streaming.name = org.apache.flink.streaming
logger.streaming.level = WARN

logger.security.name = org.apache.flink.security
logger.security.level = ERROR

# Web 监控日志 - 过滤日志文件未设置等警告
logger.webmonitor.name = org.apache.flink.runtime.webmonitor
logger.webmonitor.level = ERROR

# Security Token 管理日志 - 过滤 token 相关警告
logger.security.token.name = org.apache.flink.runtime.security.token
logger.security.token.level = ERROR

# ==================== Apache Pekko 日志配置 ====================
# Pekko 是 Flink 的通信框架，过滤其启动和运行时日志
logger.pekko.name = org.apache.pekko
logger.pekko.level = WARN

# ==================== 业务代码日志配置 ====================
# 保持业务包 (com.chenpi) 的日志为 INFO 级别，正常输出应用日志
logger.operator.name = com.chenpi
logger.operator.level = INFO